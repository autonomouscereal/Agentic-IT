<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Operations Login</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #071016;
            color: #eef7fb;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                linear-gradient(135deg, rgba(0, 212, 255, 0.12), transparent 36%),
                linear-gradient(315deg, rgba(0, 255, 136, 0.10), transparent 32%),
                #071016;
        }
        main {
            width: min(420px, calc(100vw - 32px));
            border: 1px solid rgba(135, 214, 235, 0.22);
            background: rgba(8, 22, 31, 0.94);
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .mark {
            width: 38px;
            height: 38px;
            border: 2px solid #00d4ff;
            border-radius: 50%;
            position: relative;
        }
        .mark::before,
        .mark::after {
            content: "";
            position: absolute;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #00ff88;
        }
        .mark::before { left: 8px; top: 9px; }
        .mark::after { right: 8px; bottom: 9px; background: #ffd166; }
        h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 0;
        }
        .sub {
            margin: 4px 0 0;
            color: #9ab6c2;
            font-size: 13px;
        }
        label {
            display: block;
            margin: 16px 0 7px;
            color: #c8dde5;
            font-size: 13px;
        }
        input {
            width: 100%;
            border: 1px solid rgba(154, 182, 194, 0.38);
            background: #0c1b25;
            color: #eef7fb;
            border-radius: 6px;
            padding: 12px 13px;
            font-size: 15px;
        }
        input:focus {
            outline: 2px solid rgba(0, 212, 255, 0.36);
            border-color: #00d4ff;
        }
        button {
            margin-top: 22px;
            width: 100%;
            border: 0;
            border-radius: 6px;
            padding: 12px 14px;
            background: #00d4ff;
            color: #031017;
            font-weight: 700;
            cursor: pointer;
        }
        .banner {
            display: none;
            margin-bottom: 16px;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
        }
        .banner.error {
            display: block;
            background: rgba(255, 85, 85, 0.14);
            border: 1px solid rgba(255, 85, 85, 0.35);
            color: #ffd5d5;
        }
        .banner.ok {
            display: block;
            background: rgba(0, 255, 136, 0.12);
            border: 1px solid rgba(0, 255, 136, 0.28);
            color: #c9ffdf;
        }
        footer {
            margin-top: 20px;
            color: #6d8792;
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main>
        <div class="brand">
            <div class="mark" aria-hidden="true"></div>
            <div>
                <h1>Agentic Operations</h1>
                <p class="sub">Sign in to the operations control plane.</p>
            </div>
        </div>
        <div id="message" class="banner"></div>
        <form method="post" action="/api/auth/login" autocomplete="on">
            <input type="hidden" name="next" id="next" value="/">
            <label for="username">Username</label>
            <input id="username" name="username" autocomplete="username" required autofocus>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button type="submit">Sign In</button>
        </form>
        <footer>
            Access is audited. Use your assigned dashboard account or the approved identity provider.
        </footer>
    </main>
    <script>
        const params = new URLSearchParams(window.location.search);
        const next = params.get("next") || "/";
        document.getElementById("next").value = next.startsWith("/") && !next.startsWith("//") ? next : "/";
        const message = document.getElementById("message");
        if (params.get("error")) {
            message.className = "banner error";
            message.textContent = "The username or password was not accepted.";
        } else if (params.get("logged_out")) {
            message.className = "banner ok";
            message.textContent = "You have been signed out.";
        }
    </script>
</body>
</html>
