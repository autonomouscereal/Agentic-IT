services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: soc_dashboard
      POSTGRES_USER: ${SOC_DB_USER:?SOC_DB_USER must be set}
      POSTGRES_PASSWORD: ${SOC_DB_PASSWORD:?SOC_DB_PASSWORD must be set}
    ports:
      - "${SOC_DB_BIND:-127.0.0.1}:${SOC_DB_PORT:-5433}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./api/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SOC_DB_USER:?SOC_DB_USER must be set} -d soc_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 10

  agent-memory-db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_memory
      POSTGRES_USER: agent_memory
      POSTGRES_PASSWORD: ${AGENT_MEMORY_DB_PASSWORD:?AGENT_MEMORY_DB_PASSWORD must be set}
    ports:
      - "${AGENT_MEMORY_DB_BIND:-127.0.0.1}:${AGENT_MEMORY_DB_PORT:-25490}:5432"
    volumes:
      - agent-memory-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_memory -d agent_memory"]
      interval: 5s
      timeout: 3s
      retries: 10

  ai-proxy:
    build: ./deploy/ai-proxy
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${AI_PROXY_BIND:-127.0.0.1}:${AI_PROXY_PORT:-4001}:4001"
    environment:
      PROXY_PORT: 4001
      PROXY_CONFIG_PATH: /runtime/proxy_config.json
      AI_MODEL_ROUTE: ${AI_MODEL_ROUTE:-local}
      AI_PROXY_MODEL_ROUTE: ${AI_PROXY_MODEL_ROUTE:-local}
      AI_PROXY_EXTERNAL_ENABLED: ${AI_PROXY_EXTERNAL_ENABLED:-false}
      AI_PROXY_LOCAL_MODEL: ${AI_PROXY_LOCAL_MODEL:-qwen/qwen3.6-27b}
      AI_PROXY_EXTERNAL_PROVIDER: ${AI_PROXY_EXTERNAL_PROVIDER:-nous}
      AI_PROXY_EXTERNAL_MODEL: ${AI_PROXY_EXTERNAL_MODEL:-deepseek/deepseek-v4-flash}
      AI_PROXY_LOCAL_ALIASES: ${AI_PROXY_LOCAL_ALIASES:-default,agent-default,local/agent-default,deepseek/deepseek-v4-flash,deepseek-v4-flash}
      AI_PROXY_EXTERNAL_ALIASES: ${AI_PROXY_EXTERNAL_ALIASES:-external/agent-default}
      AI_PROXY_EXTERNAL_FALLBACK_PROVIDERS: ${AI_PROXY_EXTERNAL_FALLBACK_PROVIDERS:-openrouter,lmstudio}
      LMSTUDIO_FALLBACK_PROVIDERS: ${LMSTUDIO_FALLBACK_PROVIDERS:-}
      NOUS_FALLBACK_PROVIDERS: ${NOUS_FALLBACK_PROVIDERS:-openrouter,lmstudio}
      OPENROUTER_FALLBACK_PROVIDERS: ${OPENROUTER_FALLBACK_PROVIDERS:-lmstudio}
      OPENAI_FALLBACK_PROVIDERS: ${OPENAI_FALLBACK_PROVIDERS:-}
      CUSTOM_FALLBACK_PROVIDERS: ${CUSTOM_FALLBACK_PROVIDERS:-}
      LM_STUDIO_BASE: ${LM_STUDIO_BASE:-http://host.docker.internal:1234}
      LM_STUDIO_TOKEN: ${LM_STUDIO_TOKEN:-lmstudio}
      ANTHROPIC_BASE: ${ANTHROPIC_BASE:-https://api.anthropic.com}
      NOUS_BASE: ${NOUS_BASE:-https://inference-api.nousresearch.com/v1}
      NOUS_API_KEY: ${NOUS_API_KEY:-}
      OPENROUTER_BASE: ${OPENROUTER_BASE:-https://openrouter.ai/api/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL_ALIASES: ${OPENROUTER_MODEL_ALIASES:-openrouter/free,deepseek/deepseek-v4-flash:free}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-http://agentic-operations.local}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-Agentic Operations}
      CREDENTIALS_PATH: /runtime/claude_credentials.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${PROXY_CONFIG_PATH:-./runtime/proxy_config.json}:/runtime/proxy_config.json:ro
      - ${CLAUDE_CREDENTIALS_FILE:-./runtime/empty_credentials.json}:/runtime/claude_credentials.json:rw
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4001/health', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build: ./api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${DASHBOARD_BIND:-127.0.0.1}:${DASHBOARD_PORT:-25480}:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: soc_dashboard
      DB_USER: ${SOC_DB_USER:?SOC_DB_USER must be set}
      DB_PASSWORD: ${SOC_DB_PASSWORD:?SOC_DB_PASSWORD must be set}
      ITOP_SYNC_ENABLED: ${ITOP_SYNC_ENABLED:-true}
      ITOP_HOST: ${ITOP_HOST:-}
      ITOP_PORT: ${ITOP_PORT:-25432}
      ITOP_WEB_BASE: ${ITOP_WEB_BASE:-}
      ITOP_USER: ${ITOP_USER:-}
      ITOP_PASSWORD: ${ITOP_PASSWORD:-}
      ITOP_SECURITY_TEAM_ID: ${ITOP_SECURITY_TEAM_ID:-65}
      ITOP_DEFAULT_ORG_ID: ${ITOP_DEFAULT_ORG_ID:-}
      ITOP_DEFAULT_CALLER_ID: ${ITOP_DEFAULT_CALLER_ID:-}
      SERVICENOW_INSTANCE_URL: ${SERVICENOW_INSTANCE_URL:-}
      SERVICENOW_TOKEN: ${SERVICENOW_TOKEN:-}
      SERVICENOW_USER: ${SERVICENOW_USER:-}
      SERVICENOW_PASSWORD: ${SERVICENOW_PASSWORD:-}
      SERVICENOW_ASSIGNMENT_GROUP: ${SERVICENOW_ASSIGNMENT_GROUP:-}
      SERVICENOW_REQUEST_TABLE: ${SERVICENOW_REQUEST_TABLE:-sc_request}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-}
      JIRA_ISSUE_TYPE: ${JIRA_ISSUE_TYPE:-Task}
      GENERIC_TICKETING_WEBHOOK_URL: ${GENERIC_TICKETING_WEBHOOK_URL:-}
      GENERIC_TICKETING_WEBHOOK_TOKEN: ${GENERIC_TICKETING_WEBHOOK_TOKEN:-}
      GENERIC_TICKETING_DRY_RUN: ${GENERIC_TICKETING_DRY_RUN:-false}
      WAZUH_API_URL: ${WAZUH_API_URL:-}
      WAZUH_API_USER: ${WAZUH_API_USER:-}
      WAZUH_API_PASSWORD: ${WAZUH_API_PASSWORD:-}
      WAZUH_INDEXER_URL: ${WAZUH_INDEXER_URL:-}
      WAZUH_INDEXER_USER: ${WAZUH_INDEXER_USER:-}
      WAZUH_INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:-}
      WAZUH_VERIFY_TLS: ${WAZUH_VERIFY_TLS:-false}
      ITOP_DISCOVERY_INTERVAL: ${ITOP_DISCOVERY_INTERVAL:-2}
      ITOP_FULL_SYNC_INTERVAL: ${ITOP_FULL_SYNC_INTERVAL:-60}
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL:-60}
      AGENT_HEARTBEAT_INTERVAL: ${AGENT_HEARTBEAT_INTERVAL:-15}
      AGENT_STALLED_THRESHOLD: ${AGENT_STALLED_THRESHOLD:-120}
      AGENT_WORK_BASE: ${AGENT_WORK_BASE:-/app/agent_work}
      AGENT_HARNESS: ${AGENT_HARNESS:-hermes}
      AI_MODEL_ROUTE: ${AI_MODEL_ROUTE:-local}
      MAX_CONCURRENT_AGENTS: ${MAX_CONCURRENT_AGENTS:-1}
      AGENT_TIMEOUT_MINUTES: ${AGENT_TIMEOUT_MINUTES:-0}
      AGENT_NO_OUTPUT_STALL_SECONDS: ${AGENT_NO_OUTPUT_STALL_SECONDS:-3600}
      AGENT_TRANSIENT_MODEL_RETRY_MAX: ${AGENT_TRANSIENT_MODEL_RETRY_MAX:-3}
      AGENT_TRANSIENT_MODEL_RETRY_DELAY_SECONDS: ${AGENT_TRANSIENT_MODEL_RETRY_DELAY_SECONDS:-30}
      AGENT_TRANSIENT_MODEL_FALLBACK_ENABLED: ${AGENT_TRANSIENT_MODEL_FALLBACK_ENABLED:-true}
      AGENT_TRANSIENT_MODEL_FALLBACK_MODEL: ${AGENT_TRANSIENT_MODEL_FALLBACK_MODEL:-qwen/qwen3.6-27b}
      AGENT_CURL_ALLOWED_HOSTS: ${AGENT_CURL_ALLOWED_HOSTS:-localhost,127.0.0.1,::1,host.docker.internal,ai-proxy,192.168.50.222,api.openai.com,api.anthropic.com,inference-api.nousresearch.com,virustotal.com,*.virustotal.com,urlscan.io,*.urlscan.io,hybrid-analysis.com,*.hybrid-analysis.com}
      AUTO_ASSIGNMENT_MAX_ACTIVE_PER_RULE: ${AUTO_ASSIGNMENT_MAX_ACTIVE_PER_RULE:-1}
      AGENT_AUDITOR_AUTO_RECOVER: ${AGENT_AUDITOR_AUTO_RECOVER:-false}
      AGENT_PERMISSION_MODE: ${AGENT_PERMISSION_MODE:-acceptEdits}
      AGENT_ALLOWED_TOOLS: ${AGENT_ALLOWED_TOOLS:-Read,Write,Bash(curl *),Bash(node *),Bash(npx *),Bash(playwright *)}
      AGENT_LLM_BASE_URL: ${AGENT_LLM_BASE_URL:-http://ai-proxy:4001}
      AGENT_LLM_AUTH_TOKEN: ${AGENT_LLM_AUTH_TOKEN:-}
      HERMES_BIN: ${HERMES_BIN:-/home/cereal/.hermes/hermes-agent/venv/bin/hermes}
      HERMES_HOME: ${HERMES_HOME:-/home/cereal/.hermes}
      HERMES_DEFAULT_PROVIDER: ${HERMES_DEFAULT_PROVIDER:-dashboard-proxy}
      HERMES_LOCAL_PROVIDER: ${HERMES_LOCAL_PROVIDER:-dashboard-proxy}
      HERMES_TOOLSETS: ${HERMES_TOOLSETS:-terminal,file}
      HERMES_MAX_TURNS: ${HERMES_MAX_TURNS:-90}
      HERMES_RUN_AS_UID: ${HERMES_RUN_AS_UID:-1000}
      HERMES_RUN_AS_GID: ${HERMES_RUN_AS_GID:-1000}
      HERMES_ACCEPT_HOOKS: "1"
      SUDO_PASSWORD: ${HERMES_SUDO_PASSWORD:-}
      DASHBOARD_API_BASE: ${DASHBOARD_API_BASE:-http://localhost:8000}
      DASHBOARD_AUTH_MODE: ${DASHBOARD_AUTH_MODE:-disabled}
      DASHBOARD_AUTH_ENFORCEMENT: ${DASHBOARD_AUTH_ENFORCEMENT:-audit-only}
      DASHBOARD_TRUSTED_AUTH_SECRET: ${DASHBOARD_TRUSTED_AUTH_SECRET:-}
      DASHBOARD_SERVICE_TOKEN: ${DASHBOARD_SERVICE_TOKEN:-}
      DASHBOARD_SESSION_SECRET: ${DASHBOARD_SESSION_SECRET:-}
      DASHBOARD_SESSION_TTL_SECONDS: ${DASHBOARD_SESSION_TTL_SECONDS:-3600}
      DASHBOARD_COOKIE_SECURE: ${DASHBOARD_COOKIE_SECURE:-true}
      DASHBOARD_PROTECT_UI: ${DASHBOARD_PROTECT_UI:-true}
      DASHBOARD_PUBLIC_HEALTH: ${DASHBOARD_PUBLIC_HEALTH:-false}
      DASHBOARD_CORS_ORIGINS: ${DASHBOARD_CORS_ORIGINS:-}
      DASHBOARD_HSTS: ${DASHBOARD_HSTS:-true}
      TRACK_INTERVAL: ${TRACK_INTERVAL:-10}
      STUCK_TIMEOUT_MINUTES: ${STUCK_TIMEOUT_MINUTES:-60}
      MODEL_CONFIG_PATH: /app/agent_models.json
      PLATFORM_MANIFEST_PATH: /app/platform/manifest.json
      MEMORY_DB_HOST: ${MEMORY_DB_HOST:-agent-memory-db}
      MEMORY_DB_PORT: ${MEMORY_DB_PORT:-5432}
      MEMORY_DB_NAME: ${MEMORY_DB_NAME:-agent_memory}
      MEMORY_DB_USER: ${MEMORY_DB_USER:-agent_memory}
      MEMORY_DB_PASSWORD: ${AGENT_MEMORY_DB_PASSWORD:?AGENT_MEMORY_DB_PASSWORD must be set}
    depends_on:
      db:
        condition: service_healthy
      agent-memory-db:
        condition: service_healthy
      ai-proxy:
        condition: service_healthy
    volumes:
      - ./data/agent_logs:/app/data/agent_logs
      - ./data/active_agents.json:/app/data/active_agents.json:rw
      - ./frontend:/frontend:ro
      - ./platform:/app/platform:ro
      - ./reference_skills:/app/skills:ro
      - ./agent_models.json:/app/agent_models.json:ro
      - ./agent_work:/app/agent_work
      - ${CLAUDE_CREDENTIALS_FILE:-./runtime/empty_credentials.json}:/root/.claude/.credentials.json:ro
      - ${CLAUDE_SETTINGS_FILE:-./runtime/claude_settings.json}:/root/.claude/settings.json:ro
      - ${CLAUDE_SKILLS_DIR:-./reference_skills}:/root/.claude/skills:ro
      - ${AGENTS_SKILLS_DIR:-./reference_skills}:/root/.agents/skills:ro
      - ${HERMES_HOME_DIR:-./runtime/hermes}:/home/cereal/.hermes:rw
      - ${HERMES_UV_PYTHON_DIR:-./runtime/hermes-uv-python}:/home/cereal/.local/share/uv:ro

  dashboard-tls-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${DASHBOARD_HTTPS_BIND:-0.0.0.0}:${DASHBOARD_HTTPS_PORT:-25443}:8443"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./deploy/dashboard-tls-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${DASHBOARD_TLS_DIR:-./runtime/tls}:/etc/nginx/tls:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1:8443/nginx-health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  db-data:
  agent-memory-db-data:
