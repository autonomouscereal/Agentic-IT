version: "3.8"

services:
  bridge:
    build: .
    restart: unless-stopped
    container_name: siem-ticket-bridge
    env_file:
      - .env
    volumes:
      - bridge-state:/var/lib/siem-ticket-bridge
      - bridge-logs:/var/log/siem-ticket-bridge
      - ./severity_map.json:/app/severity_map.json:ro
    command: ["python", "-m", "siem_ticket_bridge.bridge"]
    healthcheck:
      test: ["CMD", "python", "-m", "siem_ticket_bridge.bridge", "--status"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  bridge-state:
  bridge-logs:
