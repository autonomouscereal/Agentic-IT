# GitLab CE + GitLab Runner - Secure Docker Deployment
# Deployed to: /home/cereal/gitlab/ on AI Server (192.168.50.222)
#
# IMPORTANT: Do NOT use 'latest' tags. Pin versions for reproducible deployments.
# GitLab CE: https://hub.docker.com/r/gitlab/gitlab-ce/tags
# GitLab Runner: https://hub.docker.com/r/gitlab/gitlab-runner/tags

services:
  ###########################################################################
  # GitLab CE - Self-hosted Git platform with built-in CI/CD
  ###########################################################################
  gitlab:
    image: gitlab/gitlab-ce:17.11.3-ce.0
    container_name: gitlab
    restart: unless-stopped
    hostname: '${GITLAB_HOSTNAME:-192.168.50.222}'
    shm_size: '512m'

    ports:
      - '${GITLAB_HTTP_PORT:-80}:80'
      - '${GITLAB_SSH_PORT:-2222}:22'

    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab

    environment:
      GITLAB_ROOT_PASSWORD: '${GITLAB_ROOT_PASSWORD}'
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://${GITLAB_HOSTNAME:-192.168.50.222}'
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT:-2222}
        gitlab_rails['initial_root_password'] = ENV['GITLAB_ROOT_PASSWORD']
        gitlab_rails['time_zone'] = '${GITLAB_TIMEZONE:-UTC}'
        puma['worker_processes'] = 4
        puma['min_threads'] = 1
        puma['max_threads'] = 8
        sidekiq['concurrency'] = 10
        prometheus_monitoring['enable'] = false
        registry['enable'] = false
        gitlab_pages['enable'] = false
        gitlab_rails['manage_backup_path'] = true
        gitlab_rails['backup_path'] = '/var/opt/gitlab/backups'
        gitlab_rails['backup_expire_time'] = 604800
        nginx['listen_port'] = ${GITLAB_HTTP_PORT:-80}
        nginx['redirect_http_to_https'] = false

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 420s

    networks:
      - gitlab-net

  ###########################################################################
  # GitLab Runner - Executes CI/CD jobs in isolated Docker containers
  ###########################################################################
  gitlab-runner:
    image: gitlab/gitlab-runner:alpine-v17.11.0
    container_name: gitlab-runner
    restart: unless-stopped
    depends_on:
      - gitlab

    volumes:
      - runner-config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - gitlab-net

volumes:
  gitlab-config:
    name: gitlab-config
  gitlab-logs:
    name: gitlab-logs
  gitlab-data:
    name: gitlab-data
  runner-config:
    name: runner-config

networks:
  gitlab-net:
    name: gitlab-net
    driver: bridge
